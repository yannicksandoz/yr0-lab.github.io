<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cat — ISF Shader Demo</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #050509; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; font-family: monospace; color: #ccc; }
    canvas { display: block; width: min(90vw, 90vh); height: min(90vw, 90vh); border-radius: 12px; box-shadow: 0 0 60px rgba(100,200,255,0.12); }
    .controls { margin-top: 18px; display: flex; gap: 16px; align-items: center; flex-wrap: wrap; justify-content: center; font-size: 13px; }
    label { display: flex; align-items: center; gap: 6px; }
    input[type=range]    { width: 90px;  accent-color: #6af; cursor: pointer; }
    input[type=color]    { width: 34px; height: 22px; border: none; background: none; cursor: pointer; border-radius: 4px; }
    input[type=checkbox] { cursor: pointer; accent-color: #6af; }
    h1 { font-size: 13px; letter-spacing: 3px; text-transform: uppercase; color: #6af; margin-bottom: 16px; opacity: 0.7; }
    .sep { color: #333; }
  </style>
</head>
<body>
  <h1>cat.fs — ISF Shader</h1>
  <canvas id="c"></canvas>
  <div class="controls">
    <label>Fur  <input type="color"    id="fur"        value="#c79460" /></label>
    <label>Eyes <input type="color"    id="eyes"       value="#2eb848" /></label>
    <label>BG   <input type="color"    id="bg"         value="#0d0d1f" /></label>
    <label>Pupils <input type="range"  id="pupils"     min="0" max="1" step="0.01" value="0.4" /></label>
    <span class="sep">|</span>
    <label>Body <input type="checkbox" id="show_body"  /></label>
    <label>Scale <input type="range"   id="body_scale" min="0.45" max="0.90" step="0.01" value="0.65" /></label>
    <span class="sep">|</span>
    <label>Animate <input type="checkbox" id="animate" checked /></label>
  </div>

  <script>
  const canvas = document.getElementById('c');
  const gl = canvas.getContext('webgl') || canvas.getContext('experimental-webgl');
  if (!gl) { canvas.replaceWith(Object.assign(document.createElement('p'), {textContent:'WebGL not supported.'})); }

  const VERT = `
    attribute vec2 a_pos;
    void main() { gl_Position = vec4(a_pos, 0.0, 1.0); }
  `;

  const FRAG = `
    precision highp float;
    uniform vec2  RENDERSIZE;
    uniform float TIME;
    uniform vec4  fur_color;
    uniform vec4  eye_color;
    uniform vec4  bg_color;
    uniform float pupil_dilation;
    uniform int   animate;
    uniform int   show_body;
    uniform float body_scale;

    // --- SDF helpers ---
    float sdCircle(vec2 p, float r) { return length(p) - r; }

    float sdBox(vec2 p, vec2 b) {
      vec2 d = abs(p) - b;
      return length(max(d,0.0)) + min(max(d.x,d.y),0.0);
    }

    float sdTriangle(vec2 p, vec2 a, vec2 b, vec2 c) {
      vec2 e0=b-a, e1=c-b, e2=a-c;
      vec2 v0=p-a, v1=p-b, v2=p-c;
      vec2 pq0=v0-e0*clamp(dot(v0,e0)/dot(e0,e0),0.0,1.0);
      vec2 pq1=v1-e1*clamp(dot(v1,e1)/dot(e1,e1),0.0,1.0);
      vec2 pq2=v2-e2*clamp(dot(v2,e2)/dot(e2,e2),0.0,1.0);
      float s=sign(e0.x*e2.y-e0.y*e2.x);
      vec2 d=min(min(vec2(dot(pq0,pq0),s*(v0.x*e0.y-v0.y*e0.x)),
                     vec2(dot(pq1,pq1),s*(v1.x*e1.y-v1.y*e1.x))),
                     vec2(dot(pq2,pq2),s*(v2.x*e2.y-v2.y*e2.x)));
      return -sqrt(d.x)*sign(d.y);
    }

    float sdSegment(vec2 p, vec2 a, vec2 b) {
      vec2 pa=p-a, ba=b-a;
      return length(pa - ba*clamp(dot(pa,ba)/dot(ba,ba),0.0,1.0));
    }

    mat2 rot2(float a) { float c=cos(a),s=sin(a); return mat2(c,s,-s,c); }

    float fill(float d, float aa) { return smoothstep(aa,-aa,d); }

    void main() {
      vec2 uv = (gl_FragCoord.xy / RENDERSIZE) * 2.0 - 1.0;
      uv.x *= RENDERSIZE.x / RENDERSIZE.y;
      float aa = 1.5 / min(RENDERSIZE.x, RENDERSIZE.y);

      // Scene scale for body mode
      float sc = (show_body == 1) ? body_scale : 1.0;
      uv = uv / sc + vec2(0.0, (show_body == 1) ? -0.28 : 0.0);

      // Timing
      bool anim = (animate == 1);
      float t = anim ? TIME : 0.0;

      float bp = mod(t, 5.0);
      float blink = 1.0 - smoothstep(0.0,0.06,bp)*(1.0-smoothstep(0.06,0.22,bp));

      uv.y -= anim ? sin(t*1.1)*0.008 : 0.0;

      // HEAD
      vec2 headP = uv; headP.y *= 1.08;
      float head = sdCircle(headP, 0.38);

      // EARS — narrower, pivot rotation
      vec2 earPivL = vec2(-0.205, 0.188);
      vec2 earPivR = vec2( 0.205, 0.188);
      float earAngle = anim ? sin(t*2.1+0.5)*0.055 : 0.0;
      vec2 uvEL = earPivL + rot2(-earAngle) * (uv - earPivL);
      vec2 uvER = earPivR + rot2( earAngle) * (uv - earPivR);

      float earL = sdTriangle(uvEL, vec2(-0.33,0.17), vec2(-0.205,0.46), vec2(-0.10,0.21));
      float earR = sdTriangle(uvER, vec2( 0.10,0.21), vec2( 0.205,0.46), vec2( 0.33,0.17));
      float ears = min(earL, earR);
      float innerEarL = sdTriangle(uvEL, vec2(-0.29,0.19), vec2(-0.205,0.39), vec2(-0.13,0.22));
      float innerEarR = sdTriangle(uvER, vec2( 0.13,0.22), vec2( 0.205,0.39), vec2( 0.29,0.19));

      // EYES
      vec2 eyeLPos = vec2(-0.135, 0.04);
      vec2 eyeRPos = vec2( 0.135, 0.04);
      float eR = 0.078;
      float eyeL = sdCircle(uv - eyeLPos, eR);
      float eyeR2 = sdCircle(uv - eyeRPos, eR);

      float breathe = anim ? 0.5+0.5*sin(t*0.5) : 0.5;
      float slitW = clamp(mix(0.007, eR*0.82, pupil_dilation+breathe*0.14), 0.007, eR*0.88);
      float pupilL = sdBox(uv - eyeLPos, vec2(slitW, eR*0.86));
      float pupilR = sdBox(uv - eyeRPos, vec2(slitW, eR*0.86));

      // Eyelid: slides above eye when blink=1 (open), covers eye when blink=0 (closed)
      float lidH = eR * 1.12;
      vec2 lidCL = eyeLPos + vec2(0.0, eR * 2.3 * blink);
      vec2 lidCR = eyeRPos + vec2(0.0, eR * 2.3 * blink);
      float lidL = sdBox(uv - lidCL, vec2(eR*1.18, lidH));
      float lidR2 = sdBox(uv - lidCR, vec2(eR*1.18, lidH));

      vec2 shineOff = vec2(0.022, 0.026);
      float shineL = sdCircle(uv - eyeLPos - shineOff, 0.017);
      float shineR = sdCircle(uv - eyeRPos - shineOff, 0.017);

      // NOSE
      float nose = sdTriangle(uv, vec2(-0.034,-0.072), vec2(0.0,-0.100), vec2(0.034,-0.072));

      // MOUTH
      float philtrum  = sdSegment(uv, vec2(0.0,-0.100), vec2(0.0,-0.130));
      float mouthL2   = sdSegment(uv, vec2(0.0,-0.130), vec2(-0.068,-0.158));
      float mouthLtip = sdSegment(uv, vec2(-0.068,-0.158), vec2(-0.105,-0.145));
      float mouthR2   = sdSegment(uv, vec2(0.0,-0.130), vec2( 0.068,-0.158));
      float mouthRtip = sdSegment(uv, vec2( 0.068,-0.158), vec2( 0.105,-0.145));
      float mouth = min(min(philtrum,mouthL2), min(mouthLtip,min(mouthR2,mouthRtip)));

      // WHISKERS — pivot-based sway
      vec2 wRootL = vec2(-0.048,-0.096);
      vec2 wRootR = vec2( 0.048,-0.096);
      float wSway = anim ? sin(t*1.65)*0.052 : 0.0;
      vec2 uvWL = wRootL + rot2(-wSway) * (uv - wRootL);
      vec2 uvWR = wRootR + rot2( wSway) * (uv - wRootR);
      float wL1=sdSegment(uvWL, wRootL, wRootL+vec2(-0.335, 0.032));
      float wL2=sdSegment(uvWL, wRootL, wRootL+vec2(-0.335, 0.000));
      float wL3=sdSegment(uvWL, wRootL, wRootL+vec2(-0.335,-0.040));
      float wR1=sdSegment(uvWR, wRootR, wRootR+vec2( 0.335, 0.032));
      float wR2=sdSegment(uvWR, wRootR, wRootR+vec2( 0.335, 0.000));
      float wR3=sdSegment(uvWR, wRootR, wRootR+vec2( 0.335,-0.040));
      float whiskers = min(min(wL1,wL2), min(wL3, min(min(wR1,wR2),wR3)));

      // FOREHEAD STRIPES
      float strM=sdSegment(uv, vec2( 0.000,0.22), vec2( 0.000,0.36));
      float strL=sdSegment(uv, vec2(-0.095,0.20), vec2(-0.065,0.34));
      float strR=sdSegment(uv, vec2( 0.095,0.20), vec2( 0.065,0.34));
      float stripes = min(strM, min(strL, strR));

      // BODY parts
      vec2 bodyP2 = uv - vec2(0.0,-0.70); bodyP2.x /= 0.88;
      float body_sdf = sdCircle(bodyP2, 0.28);

      float tailSway = anim ? sin(t*0.65)*0.18 : 0.0;
      vec2 tailPiv = vec2(0.23,-0.70);
      vec2 uvT = tailPiv + rot2(-tailSway) * (uv - tailPiv);
      float tailLine = min(min(sdSegment(uvT, vec2(0.23,-0.70), vec2(0.46,-0.52)),
                               sdSegment(uvT, vec2(0.46,-0.52), vec2(0.58,-0.30))),
                           min(sdSegment(uvT, vec2(0.58,-0.30), vec2(0.54,-0.12)),
                               sdSegment(uvT, vec2(0.54,-0.12), vec2(0.40,-0.07))));
      float tailTip = sdCircle(uvT - vec2(0.40,-0.07), 0.044);

      vec2 pawLP2 = uv - vec2(-0.13,-0.94); pawLP2.y *= 0.65;
      float pawL2 = sdCircle(pawLP2, 0.092);
      vec2 pawRP2 = uv - vec2( 0.13,-0.94); pawRP2.y *= 0.65;
      float pawR3 = sdCircle(pawRP2, 0.092);

      vec2 bellyP = uv - vec2(0.0,-0.74); bellyP.y *= 1.25;
      float belly = sdCircle(bellyP, 0.155);

      float toes = min(
        min(sdSegment(uv,vec2(-0.20,-0.96),vec2(-0.20,-1.00)),
            min(sdSegment(uv,vec2(-0.13,-0.97),vec2(-0.13,-1.02)),
                sdSegment(uv,vec2(-0.06,-0.96),vec2(-0.06,-1.00)))),
        min(sdSegment(uv,vec2( 0.06,-0.96),vec2( 0.06,-1.00)),
            min(sdSegment(uv,vec2( 0.13,-0.97),vec2( 0.13,-1.02)),
                sdSegment(uv,vec2( 0.20,-0.96),vec2( 0.20,-1.00)))));

      // COMPOSITING
      vec3 col = bg_color.rgb;
      vec3 fur  = fur_color.rgb;

      if (show_body == 1) {
        col = mix(col, fur, step(tailLine, 0.030));
        col = mix(col, fur, fill(tailTip, aa));
        col = mix(col, fur, fill(body_sdf, aa));
        col = mix(col, mix(fur, vec3(1.0), 0.45), fill(belly,aa)*fill(body_sdf,aa));
        col = mix(col, fur, fill(pawL2, aa));
        col = mix(col, fur, fill(pawR3, aa));
        col = mix(col, fur*0.55, step(toes,0.0045)*(fill(pawL2,aa)+fill(pawR3,aa)));
      }

      col = mix(col, fur, fill(min(head,ears), aa));
      col = mix(col, vec3(0.96,0.60,0.68), fill(innerEarL, aa));
      col = mix(col, vec3(0.96,0.60,0.68), fill(innerEarR, aa));
      col = mix(col, fur*0.55, step(stripes,0.006)*fill(head,aa));

      col = mix(col, eye_color.rgb, fill(eyeL, aa));
      col = mix(col, eye_color.rgb, fill(eyeR2, aa));
      col = mix(col, vec3(0.03,0.02,0.04), fill(pupilL,aa)*fill(eyeL,aa)*blink);
      col = mix(col, vec3(0.03,0.02,0.04), fill(pupilR,aa)*fill(eyeR2,aa)*blink);
      col = mix(col, vec3(1.0), fill(shineL,aa)*fill(eyeL,aa)*blink);
      col = mix(col, vec3(1.0), fill(shineR,aa)*fill(eyeR2,aa)*blink);
      col = mix(col, fur, fill(lidL,aa)*fill(eyeL,aa));
      col = mix(col, fur, fill(lidR2,aa)*fill(eyeR2,aa));

      col = mix(col, vec3(0.90,0.38,0.50), fill(nose, aa));
      col = mix(col, vec3(0.28,0.10,0.14), step(mouth,0.0055)*fill(head,aa));
      col = mix(col, vec3(0.95,0.95,0.98), step(whiskers,0.0028));

      gl_FragColor = vec4(col, 1.0);
    }
  `;

  function compile(type, src) {
    const s = gl.createShader(type);
    gl.shaderSource(s, src);
    gl.compileShader(s);
    if (!gl.getShaderParameter(s, gl.COMPILE_STATUS))
      console.error('Shader error:', gl.getShaderInfoLog(s));
    return s;
  }

  const prog = gl.createProgram();
  gl.attachShader(prog, compile(gl.VERTEX_SHADER,   VERT));
  gl.attachShader(prog, compile(gl.FRAGMENT_SHADER, FRAG));
  gl.linkProgram(prog);
  if (!gl.getProgramParameter(prog, gl.LINK_STATUS))
    console.error('Link error:', gl.getProgramInfoLog(prog));
  gl.useProgram(prog);

  const buf = gl.createBuffer();
  gl.bindBuffer(gl.ARRAY_BUFFER, buf);
  gl.bufferData(gl.ARRAY_BUFFER, new Float32Array([-1,-1, 1,-1, -1,1, 1,1]), gl.STATIC_DRAW);
  const posLoc = gl.getAttribLocation(prog, 'a_pos');
  gl.enableVertexAttribArray(posLoc);
  gl.vertexAttribPointer(posLoc, 2, gl.FLOAT, false, 0, 0);

  const u = {
    RENDERSIZE:     gl.getUniformLocation(prog, 'RENDERSIZE'),
    TIME:           gl.getUniformLocation(prog, 'TIME'),
    fur_color:      gl.getUniformLocation(prog, 'fur_color'),
    eye_color:      gl.getUniformLocation(prog, 'eye_color'),
    bg_color:       gl.getUniformLocation(prog, 'bg_color'),
    pupil_dilation: gl.getUniformLocation(prog, 'pupil_dilation'),
    animate:        gl.getUniformLocation(prog, 'animate'),
    show_body:      gl.getUniformLocation(prog, 'show_body'),
    body_scale:     gl.getUniformLocation(prog, 'body_scale'),
  };

  function hexToVec4(hex) {
    return [
      parseInt(hex.slice(1,3),16)/255,
      parseInt(hex.slice(3,5),16)/255,
      parseInt(hex.slice(5,7),16)/255,
      1.0
    ];
  }

  function resize() {
    const s = Math.min(window.innerWidth*0.9, window.innerHeight*0.82);
    canvas.width  = Math.round(s * devicePixelRatio);
    canvas.height = Math.round(s * devicePixelRatio);
    gl.viewport(0, 0, canvas.width, canvas.height);
  }
  window.addEventListener('resize', resize);
  resize();

  const startTime = performance.now();

  function render() {
    const t = (performance.now() - startTime) / 1000;
    gl.uniform2f(u.RENDERSIZE,    canvas.width, canvas.height);
    gl.uniform1f(u.TIME,          t);
    gl.uniform4fv(u.fur_color,    hexToVec4(document.getElementById('fur').value));
    gl.uniform4fv(u.eye_color,    hexToVec4(document.getElementById('eyes').value));
    gl.uniform4fv(u.bg_color,     hexToVec4(document.getElementById('bg').value));
    gl.uniform1f(u.pupil_dilation,parseFloat(document.getElementById('pupils').value));
    gl.uniform1i(u.animate,       document.getElementById('animate').checked   ? 1 : 0);
    gl.uniform1i(u.show_body,     document.getElementById('show_body').checked ? 1 : 0);
    gl.uniform1f(u.body_scale,    parseFloat(document.getElementById('body_scale').value));
    gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4);
    requestAnimationFrame(render);
  }
  render();
  </script>
</body>
</html>
