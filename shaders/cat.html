<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cat — ISF Shader Demo</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #050509;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      min-height: 100vh; font-family: monospace; color: #aaa;
    }
    canvas {
      display: block;
      width: min(86vw, 72vh); height: min(86vw, 72vh);
      border-radius: 12px;
      box-shadow: 0 0 60px rgba(100,200,255,0.10);
    }
    h1 { font-size: 12px; letter-spacing: 3px; text-transform: uppercase; color: #6af; margin-bottom: 14px; opacity: 0.6; }

    .panel {
      margin-top: 16px;
      display: flex; flex-direction: column; gap: 10px;
      width: min(86vw, 560px);
    }
    .row {
      display: flex; flex-wrap: wrap; gap: 10px 18px;
      align-items: center;
    }
    .group-label {
      font-size: 10px; letter-spacing: 2px; text-transform: uppercase;
      color: #6af; opacity: 0.5; width: 100%; margin-bottom: -4px;
    }
    label {
      display: flex; align-items: center; gap: 6px; font-size: 12px; white-space: nowrap;
    }
    input[type=range]    { width: 80px; accent-color: #6af; cursor: pointer; }
    input[type=color]    { width: 32px; height: 20px; border: none; background: none; cursor: pointer; border-radius: 3px; padding: 0; }
    input[type=checkbox] { cursor: pointer; accent-color: #6af; }
    .val { color: #6af; font-size: 11px; min-width: 28px; }
  </style>
</head>
<body>
  <h1>cat.fs — ISF Shader</h1>
  <canvas id="c"></canvas>

  <div class="panel">
    <!-- Colors + Pupils -->
    <div class="row">
      <span class="group-label">Colors &amp; Shape</span>
      <label>Fur  <input type="color" id="fur"   value="#c79460"></label>
      <label>Eyes <input type="color" id="eyes"  value="#2eb848"></label>
      <label>BG   <input type="color" id="bg"    value="#0d0d1f"></label>
      <label>Pupils
        <input type="range" id="pupils" min="0" max="1" step="0.01" value="0.4">
        <span class="val" id="v_pupils">0.40</span>
      </label>
    </div>

    <!-- Animation toggles + amplitude sliders -->
    <div class="row">
      <span class="group-label">Animation</span>
      <label>Animate <input type="checkbox" id="animate" checked></label>
      <label>Blink rate
        <input type="range" id="blink_rate" min="0.2" max="4" step="0.05" value="1">
        <span class="val" id="v_blink">1.00</span>
      </label>
      <label>Bob
        <input type="range" id="bob_amp" min="0" max="1" step="0.01" value="0.5">
        <span class="val" id="v_bob">0.50</span>
      </label>
      <label>Ears
        <input type="range" id="ear_amp" min="0" max="1" step="0.01" value="0.5">
        <span class="val" id="v_ear">0.50</span>
      </label>
      <label>Whiskers
        <input type="range" id="whisker_amp" min="0" max="1" step="0.01" value="0.5">
        <span class="val" id="v_whisk">0.50</span>
      </label>
      <label>Tail
        <input type="range" id="tail_amp" min="0" max="1" step="0.01" value="0.5">
        <span class="val" id="v_tail">0.50</span>
      </label>
    </div>

    <!-- Body options -->
    <div class="row">
      <span class="group-label">Body</span>
      <label>Show body <input type="checkbox" id="show_body"></label>
      <label>Neck gap
        <input type="range" id="neck_gap" min="-0.20" max="0.28" step="0.005" value="0.04">
        <span class="val" id="v_neck">0.04</span>
      </label>
      <label>Scale
        <input type="range" id="body_scale" min="0.45" max="0.90" step="0.01" value="0.65">
        <span class="val" id="v_scale">0.65</span>
      </label>
    </div>
  </div>

  <script>
  // Live value readouts
  const readouts = {
    pupils:     'v_pupils',
    blink_rate: 'v_blink',
    bob_amp:    'v_bob',
    ear_amp:    'v_ear',
    whisker_amp:'v_whisk',
    tail_amp:   'v_tail',
    neck_gap:   'v_neck',
    body_scale: 'v_scale',
  };
  Object.entries(readouts).forEach(([id, vid]) => {
    const el = document.getElementById(id);
    const out = document.getElementById(vid);
    el.addEventListener('input', () => { out.textContent = parseFloat(el.value).toFixed(2); });
  });

  // WebGL setup
  const canvas = document.getElementById('c');
  const gl = canvas.getContext('webgl') || canvas.getContext('experimental-webgl');
  if (!gl) {
    canvas.replaceWith(Object.assign(document.createElement('p'), {textContent:'WebGL not supported.'}));
    throw '';
  }

  const VERT = `
    attribute vec2 a_pos;
    void main() { gl_Position = vec4(a_pos, 0.0, 1.0); }
  `;

  const FRAG = `
    precision highp float;
    uniform vec2  RENDERSIZE;
    uniform float TIME;
    uniform vec4  fur_color;
    uniform vec4  eye_color;
    uniform vec4  bg_color;
    uniform float pupil_dilation;
    uniform int   animate;
    uniform float blink_rate;
    uniform float bob_amp;
    uniform float ear_amp;
    uniform float whisker_amp;
    uniform float tail_amp;
    uniform int   show_body;
    uniform float neck_gap;
    uniform float body_scale;

    // ---- SDF helpers ----
    float sdCircle(vec2 p, float r) { return length(p)-r; }

    float sdBox(vec2 p, vec2 b) {
      vec2 d=abs(p)-b;
      return length(max(d,0.0))+min(max(d.x,d.y),0.0);
    }

    float sdTriangle(vec2 p, vec2 a, vec2 b, vec2 c) {
      vec2 e0=b-a,e1=c-b,e2=a-c;
      vec2 v0=p-a,v1=p-b,v2=p-c;
      vec2 pq0=v0-e0*clamp(dot(v0,e0)/dot(e0,e0),0.0,1.0);
      vec2 pq1=v1-e1*clamp(dot(v1,e1)/dot(e1,e1),0.0,1.0);
      vec2 pq2=v2-e2*clamp(dot(v2,e2)/dot(e2,e2),0.0,1.0);
      float s=sign(e0.x*e2.y-e0.y*e2.x);
      vec2 d=min(min(vec2(dot(pq0,pq0),s*(v0.x*e0.y-v0.y*e0.x)),
                     vec2(dot(pq1,pq1),s*(v1.x*e1.y-v1.y*e1.x))),
                     vec2(dot(pq2,pq2),s*(v2.x*e2.y-v2.y*e2.x)));
      return -sqrt(d.x)*sign(d.y);
    }

    float sdSegment(vec2 p, vec2 a, vec2 b) {
      vec2 pa=p-a,ba=b-a;
      return length(pa-ba*clamp(dot(pa,ba)/dot(ba,ba),0.0,1.0));
    }

    float sdBezier(vec2 pos, vec2 A, vec2 B, vec2 C) {
      vec2 a=B-A,b=A-2.0*B+C,c=a*2.0,d=A-pos;
      float kk=1.0/dot(b,b);
      float kx=kk*dot(a,b);
      float ky=kk*(2.0*dot(a,a)+dot(d,b))/3.0;
      float kz=kk*dot(d,a);
      float p=ky-kx*kx,p3=p*p*p;
      float q=kx*(2.0*kx*kx-3.0*ky)+kz;
      float h=q*q+4.0*p3;
      float res;
      if(h>=0.0){
        h=sqrt(h);
        vec2 x=(vec2(h,-h)-q)/2.0;
        vec2 uv2=sign(x)*pow(abs(x),vec2(1.0/3.0));
        float t2=clamp(uv2.x+uv2.y-kx,0.0,1.0);
        vec2 qos=d+(c+b*t2)*t2;
        res=dot(qos,qos);
      } else {
        float z=sqrt(-p);
        float v=acos(q/(p*z*2.0))/3.0;
        float m=cos(v),n=sin(v)*1.732050808;
        vec3 t3=clamp(vec3(m+m,-n-m,n-m)*z-kx,0.0,1.0);
        float da=dot(d+(c+b*t3.x)*t3.x,d+(c+b*t3.x)*t3.x);
        float db=dot(d+(c+b*t3.y)*t3.y,d+(c+b*t3.y)*t3.y);
        res=min(da,db);
      }
      return sqrt(res);
    }

    mat2 rot2(float a){ float c=cos(a),s=sin(a); return mat2(c,s,-s,c); }
    float fill(float d, float aa){ return smoothstep(aa,-aa,d); }

    void main() {
      vec2 uv = (gl_FragCoord.xy/RENDERSIZE)*2.0-1.0;
      uv.x *= RENDERSIZE.x/RENDERSIZE.y;
      float aa = 1.5/min(RENDERSIZE.x,RENDERSIZE.y);

      bool anim = (animate==1);
      bool body = (show_body==1);

      float sc = body ? body_scale : 1.0;
      uv = uv/sc + vec2(0.0, body ? -0.28 : 0.0);

      float t = anim ? TIME : 0.0;

      float bp    = mod(t*blink_rate, 5.0);
      float blink = 1.0 - smoothstep(0.0,0.06,bp)*(1.0-smoothstep(0.06,0.22,bp));

      uv.y -= anim ? sin(t*1.1)*(bob_amp*0.016) : 0.0;

      // HEAD
      vec2 headP=uv; headP.y*=1.08;
      float head=sdCircle(headP,0.38);

      // EARS
      vec2 earPivL=vec2(-0.205,0.188), earPivR=vec2(0.205,0.188);
      float earAngle = anim ? sin(t*2.1+0.5)*(ear_amp*0.11) : 0.0;
      vec2 uvEL=earPivL+rot2(-earAngle)*(uv-earPivL);
      vec2 uvER=earPivR+rot2( earAngle)*(uv-earPivR);
      float earL=sdTriangle(uvEL,vec2(-0.33,0.17),vec2(-0.205,0.46),vec2(-0.10,0.21));
      float earR=sdTriangle(uvER,vec2( 0.10,0.21),vec2( 0.205,0.46),vec2( 0.33,0.17));
      float ears=min(earL,earR);
      float innerEarL=sdTriangle(uvEL,vec2(-0.29,0.19),vec2(-0.205,0.39),vec2(-0.13,0.22));
      float innerEarR=sdTriangle(uvER,vec2( 0.13,0.22),vec2( 0.205,0.39),vec2( 0.29,0.19));

      // EYES
      vec2 eyeLPos=vec2(-0.135,0.04), eyeRPos=vec2(0.135,0.04);
      float eR=0.078;
      float eyeL=sdCircle(uv-eyeLPos,eR), eyeR2=sdCircle(uv-eyeRPos,eR);
      float breathe=anim?0.5+0.5*sin(t*0.5):0.5;
      float slitW=clamp(mix(0.007,eR*0.82,pupil_dilation+breathe*0.14),0.007,eR*0.88);
      float pupilL=sdBox(uv-eyeLPos,vec2(slitW,eR*0.86));
      float pupilR=sdBox(uv-eyeRPos,vec2(slitW,eR*0.86));
      float lidH=eR*1.12;
      vec2 lidCL=eyeLPos+vec2(0.0,eR*2.3*blink);
      vec2 lidCR=eyeRPos+vec2(0.0,eR*2.3*blink);
      float lidL=sdBox(uv-lidCL,vec2(eR*1.18,lidH));
      float lidR2=sdBox(uv-lidCR,vec2(eR*1.18,lidH));
      float shineL=sdCircle(uv-eyeLPos-vec2(0.022,0.026),0.017);
      float shineR=sdCircle(uv-eyeRPos-vec2(0.022,0.026),0.017);

      // NOSE + MOUTH
      float nose=sdTriangle(uv,vec2(-0.034,-0.072),vec2(0.0,-0.100),vec2(0.034,-0.072));
      float mouth=min(min(
        sdSegment(uv,vec2(0.0,-0.100),vec2(0.0,-0.130)),
        sdSegment(uv,vec2(0.0,-0.130),vec2(-0.068,-0.158))),min(
        sdSegment(uv,vec2(-0.068,-0.158),vec2(-0.105,-0.145)),min(
        sdSegment(uv,vec2(0.0,-0.130),vec2(0.068,-0.158)),
        sdSegment(uv,vec2(0.068,-0.158),vec2(0.105,-0.145)))));

      // WHISKERS
      vec2 wRL=vec2(-0.048,-0.096), wRR=vec2(0.048,-0.096);
      float wSway=anim?sin(t*1.65)*(whisker_amp*0.10):0.0;
      vec2 uvWL=wRL+rot2(-wSway)*(uv-wRL);
      vec2 uvWR=wRR+rot2( wSway)*(uv-wRR);
      float whiskers=min(min(
        sdSegment(uvWL,wRL,wRL+vec2(-0.335, 0.032)),
        sdSegment(uvWL,wRL,wRL+vec2(-0.335, 0.000))),min(
        sdSegment(uvWL,wRL,wRL+vec2(-0.335,-0.040)),min(
        sdSegment(uvWR,wRR,wRR+vec2( 0.335, 0.032)),min(
        sdSegment(uvWR,wRR,wRR+vec2( 0.335, 0.000)),
        sdSegment(uvWR,wRR,wRR+vec2( 0.335,-0.040))))));

      // STRIPES
      float stripes=min(
        sdSegment(uv,vec2(0.0,0.22),vec2(0.0,0.36)),min(
        sdSegment(uv,vec2(-0.095,0.20),vec2(-0.065,0.34)),
        sdSegment(uv,vec2(0.095,0.20),vec2(0.065,0.34))));

      // BODY PARTS
      float bY = -0.632 - neck_gap;

      float neckHalf = max(0.0, neck_gap*0.5);
      float neck_sdf = sdBox(uv-vec2(0.0,(-0.352+bY+0.28)*0.5), vec2(0.108,neckHalf));

      vec2 bodyP=uv-vec2(0.0,bY); bodyP.x/=0.88;
      float body_sdf=sdCircle(bodyP,0.28);

      // Tail — two chained Beziers, pivot-swayed as one piece
      float tSway=anim?sin(t*0.65)*(tail_amp*0.32):0.0;
      vec2 tPiv=vec2(0.24,bY);
      vec2 uvT=tPiv+rot2(-tSway)*(uv-tPiv);
      vec2 tA=vec2(0.24,bY), tB=vec2(0.58,bY-0.08), tC=vec2(0.50,bY-0.30);
      vec2 tD=vec2(0.36,bY-0.44), tE2=vec2(0.18,bY-0.28);
      float tail_sdf=min(sdBezier(uvT,tA,tB,tC)-0.033,
                         sdBezier(uvT,tC,tD,tE2)-0.024);
      float tailTip=sdCircle(uvT-tE2, 0.024);

      // Paws
      vec2 pawLP=uv-vec2(-0.13,bY-0.31); pawLP.y*=0.65;
      float pawL2=sdCircle(pawLP,0.092);
      vec2 pawRP=uv-vec2( 0.13,bY-0.31); pawRP.y*=0.65;
      float pawR3=sdCircle(pawRP,0.092);

      vec2 bellyP=uv-vec2(0.0,bY-0.04); bellyP.y*=1.25;
      float belly=sdCircle(bellyP,0.155);

      float toes=min(min(
        sdSegment(uv,vec2(-0.20,bY-0.33),vec2(-0.20,bY-0.38)),
        sdSegment(uv,vec2(-0.13,bY-0.34),vec2(-0.13,bY-0.39))),min(
        sdSegment(uv,vec2(-0.06,bY-0.33),vec2(-0.06,bY-0.38)),min(
        sdSegment(uv,vec2( 0.06,bY-0.33),vec2( 0.06,bY-0.38)),min(
        sdSegment(uv,vec2( 0.13,bY-0.34),vec2( 0.13,bY-0.39)),
        sdSegment(uv,vec2( 0.20,bY-0.33),vec2( 0.20,bY-0.38))))));

      // ---- Composite ----
      vec3 col=bg_color.rgb, fur=fur_color.rgb;

      if (body) {
        col=mix(col,fur,fill(tail_sdf,aa));
        col=mix(col,fur,fill(tailTip,aa));
        col=mix(col,fur,fill(neck_sdf,aa));
        col=mix(col,fur,fill(body_sdf,aa));
        col=mix(col,mix(fur,vec3(1.0),0.45),fill(belly,aa)*fill(body_sdf,aa));
        col=mix(col,fur,fill(pawL2,aa));
        col=mix(col,fur,fill(pawR3,aa));
        col=mix(col,fur*0.55,step(toes,0.0045)*(fill(pawL2,aa)+fill(pawR3,aa)));
      }

      col=mix(col,fur,fill(min(head,ears),aa));
      col=mix(col,vec3(0.96,0.60,0.68),fill(innerEarL,aa));
      col=mix(col,vec3(0.96,0.60,0.68),fill(innerEarR,aa));
      col=mix(col,fur*0.55,step(stripes,0.006)*fill(head,aa));

      col=mix(col,eye_color.rgb,fill(eyeL,aa));
      col=mix(col,eye_color.rgb,fill(eyeR2,aa));
      col=mix(col,vec3(0.03,0.02,0.04),fill(pupilL,aa)*fill(eyeL,aa)*blink);
      col=mix(col,vec3(0.03,0.02,0.04),fill(pupilR,aa)*fill(eyeR2,aa)*blink);
      col=mix(col,vec3(1.0),fill(shineL,aa)*fill(eyeL,aa)*blink);
      col=mix(col,vec3(1.0),fill(shineR,aa)*fill(eyeR2,aa)*blink);
      col=mix(col,fur,fill(lidL, aa)*fill(eyeL,aa));
      col=mix(col,fur,fill(lidR2,aa)*fill(eyeR2,aa));

      col=mix(col,vec3(0.90,0.38,0.50),fill(nose,aa));
      col=mix(col,vec3(0.28,0.10,0.14),step(mouth,0.0055)*fill(head,aa));
      col=mix(col,vec3(0.95,0.95,0.98),step(whiskers,0.0028));

      gl_FragColor=vec4(col,1.0);
    }
  `;

  function compile(type, src) {
    const s = gl.createShader(type);
    gl.shaderSource(s, src); gl.compileShader(s);
    if (!gl.getShaderParameter(s, gl.COMPILE_STATUS))
      console.error(gl.getShaderInfoLog(s));
    return s;
  }
  const prog = gl.createProgram();
  gl.attachShader(prog, compile(gl.VERTEX_SHADER,   VERT));
  gl.attachShader(prog, compile(gl.FRAGMENT_SHADER, FRAG));
  gl.linkProgram(prog);
  if (!gl.getProgramParameter(prog, gl.LINK_STATUS))
    console.error(gl.getProgramInfoLog(prog));
  gl.useProgram(prog);

  const buf = gl.createBuffer();
  gl.bindBuffer(gl.ARRAY_BUFFER, buf);
  gl.bufferData(gl.ARRAY_BUFFER, new Float32Array([-1,-1, 1,-1, -1,1, 1,1]), gl.STATIC_DRAW);
  const posLoc = gl.getAttribLocation(prog, 'a_pos');
  gl.enableVertexAttribArray(posLoc);
  gl.vertexAttribPointer(posLoc, 2, gl.FLOAT, false, 0, 0);

  const u = {};
  ['RENDERSIZE','TIME','fur_color','eye_color','bg_color','pupil_dilation',
   'animate','blink_rate','bob_amp','ear_amp','whisker_amp','tail_amp',
   'show_body','neck_gap','body_scale'].forEach(n => {
    u[n] = gl.getUniformLocation(prog, n);
  });

  function hexToVec4(h) {
    return [parseInt(h.slice(1,3),16)/255, parseInt(h.slice(3,5),16)/255,
            parseInt(h.slice(5,7),16)/255, 1.0];
  }
  function fv(id)  { return parseFloat(document.getElementById(id).value); }
  function cb(id)  { return document.getElementById(id).checked ? 1 : 0; }
  function col(id) { return hexToVec4(document.getElementById(id).value); }

  function resize() {
    const s = Math.min(window.innerWidth*0.86, window.innerHeight*0.70);
    canvas.width  = Math.round(s * devicePixelRatio);
    canvas.height = Math.round(s * devicePixelRatio);
    gl.viewport(0, 0, canvas.width, canvas.height);
  }
  window.addEventListener('resize', resize);
  resize();

  const t0 = performance.now();
  function render() {
    const t = (performance.now()-t0)/1000;
    gl.uniform2f(u.RENDERSIZE, canvas.width, canvas.height);
    gl.uniform1f(u.TIME, t);
    gl.uniform4fv(u.fur_color,    col('fur'));
    gl.uniform4fv(u.eye_color,    col('eyes'));
    gl.uniform4fv(u.bg_color,     col('bg'));
    gl.uniform1f(u.pupil_dilation,fv('pupils'));
    gl.uniform1i(u.animate,       cb('animate'));
    gl.uniform1f(u.blink_rate,    fv('blink_rate'));
    gl.uniform1f(u.bob_amp,       fv('bob_amp'));
    gl.uniform1f(u.ear_amp,       fv('ear_amp'));
    gl.uniform1f(u.whisker_amp,   fv('whisker_amp'));
    gl.uniform1f(u.tail_amp,      fv('tail_amp'));
    gl.uniform1i(u.show_body,     cb('show_body'));
    gl.uniform1f(u.neck_gap,      fv('neck_gap'));
    gl.uniform1f(u.body_scale,    fv('body_scale'));
    gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4);
    requestAnimationFrame(render);
  }
  render();
  </script>
</body>
</html>
